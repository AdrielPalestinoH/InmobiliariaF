<div class="container mt-4">
  <h2 class="mb-3">Gestión de Créditos Hipotecarios</h2>

  <div class="text-end mb-3">
    <button class="btn btn-success" (click)="nuevoCredito()">+ Crear Nuevo Crédito</button>
  </div>

  <div *ngIf="!mostrarFormulario">
    <table class="table table-striped table-hover shadow-sm">
      <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Cliente</th>
          <th>Inmueble</th>
          <th>Monto Crédito</th>
          <th>Plazo</th>
          <th>Tasa Anual</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let c of creditos">
          <td>{{ c.id }}</td>
          <td>{{ c.usuarioNombre || 'Cargando...' }}</td>
          <td>{{ c.inmuebleDescripcion || 'Cargando...' }}</td>
          <td>{{ c.montoCredito | currency }}</td>
          <td>{{ c.plazoTotalMeses }} meses</td>
          <td>{{ c.tasaInteresAnualPct }}%</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div *ngIf="mostrarFormulario" class="card p-4 shadow">
    <h4 class="mb-4 text-primary">Nuevo Registro de Crédito</h4>

    <form (ngSubmit)="guardar()">
      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Cliente</label>
          <select [(ngModel)]="nuevo.usuarioId" name="usuarioId" class="form-select" required>
            <option [value]="null">Seleccione cliente...</option>
            <option *ngFor="let u of clientes" [value]="u.id">{{ u.nombre }} {{ u.apellidos }}</option>
          </select>
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">Inmueble</label>
          <select [(ngModel)]="nuevo.inmuebleId" name="inmuebleId" class="form-select" required>
            <option [value]="null">Seleccione inmueble...</option>
            <option *ngFor="let i of inmuebles" [value]="i.id">{{ i.descripcion }}</option>
          </select>
        </div>

        <div class="col-md-4 mb-3">
          <label class="form-label">Monto Enganche</label>
          <input [(ngModel)]="nuevo.montoEnganche" name="montoEnganche" type="number" class="form-control" />
        </div>

        <div class="col-md-4 mb-3">
          <label class="form-label">Monto Crédito</label>
          <input [(ngModel)]="nuevo.montoCredito" name="montoCredito" type="number" class="form-control" required />
        </div>

        <div class="col-md-4 mb-3">
          <label class="form-label">Plazo (Meses)</label>
          <input [(ngModel)]="nuevo.plazoTotalMeses" name="plazoTotalMeses" type="number" class="form-control" required />
        </div>

        <div class="col-md-3 mb-3">
          <label class="form-label">Tasa Anual (%)</label>
          <input [(ngModel)]="nuevo.tasaInteresAnualPct" name="tasaInteresAnualPct" type="number" step="0.01" class="form-control" />
        </div>

        <div class="col-md-3 mb-3">
          <label class="form-label">Tasa Mora (%)</label>
          <input [(ngModel)]="nuevo.tasaInteresMoratorioPct" name="tasaInteresMoratorioPct" type="number" step="0.01" class="form-control" />
        </div>

        <div class="col-md-3 mb-3">
          <label class="form-label">Comisión Apertura (%)</label>
          <input [(ngModel)]="nuevo.comisionAperturaPct" name="comisionAperturaPct" type="number" step="0.01" class="form-control" />
        </div>

        <div class="col-md-3 mb-3">
          <label class="form-label">Día de Pago</label>
          <input [(ngModel)]="nuevo.diaPagoMensual" name="diaPagoMensual" type="number" min="1" max="28" class="form-control" />
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">Fecha Apertura</label>
          <input [(ngModel)]="nuevo.fechaApertura" name="fechaApertura" type="date" class="form-control" required />
        </div>
      </div>

      <div class="d-flex justify-content-end mt-4 gap-2">
        <button type="button" class="btn btn-secondary" (click)="cancelar()">Cancelar</button>
        <button type="submit" class="btn btn-primary px-4">Guardar Crédito</button>
      </div>
    </form>
  </div>
</div>
