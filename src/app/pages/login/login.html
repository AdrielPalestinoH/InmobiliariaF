<div class="login-page d-flex flex-column min-vh-100">
  <!-- Navbar -->
  <app-navbar></app-navbar>

  <!-- Login -->
  <main class="login-main d-flex flex-grow-1 align-items-center justify-content-center px-3 py-4">
    <div class="login-card card shadow p-4 text-center">
      <div class="login-icon mx-auto mb-3 d-flex align-items-center justify-content-center" aria-hidden="true">
        <svg class="login-icon__svg" width="26" height="26" viewBox="0 0 24 24" fill="none"
          xmlns="http://www.w3.org/2000/svg">
          <path
            d="M4 6.5C4 5.67157 4.67157 5 5.5 5H18.5C19.3284 5 20 5.67157 20 6.5V17.5C20 18.3284 19.3284 19 18.5 19H5.5C4.67157 19 4 18.3284 4 17.5V6.5Z"
            stroke="#2f3f9e" stroke-width="1.8" />
          <path d="M5.5 7.5L11.2 12.0C11.6763 12.3787 12.3237 12.3787 12.8 12.0L18.5 7.5" stroke="#2f3f9e"
            stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </div>

      <h2 class="login-title fw-bold mb-2">Bienvenido</h2>
      <p class="login-subtitle text-muted mb-4">
        Ingresa tu correo para recibir un enlace y asegurarnos que eres tu.
      </p>

      <form (ngSubmit)="onSubmit()" class="login-form text-start">
        <div class="mb-3">
          <input type="email" [(ngModel)]="email" name="email" class="form-control form-control-lg"
            placeholder="tu@correo.com" autocomplete="email" required />
        </div>

        <!-- Este lo dejaremos aqui por el momento en lo que revisamos la base de datos-->
        <input type="password" [(ngModel)]="pwd" name="pwd" hidden />

        <div *ngIf="error" class="alert alert-danger p-2 text-center mb-3">{{ error }}</div>

        <button type="submit" class="login__btn">
          Enviar enlace mágico
        </button>
      </form>

      <p class="login-footnote text-muted small mt-3 mb-0">
        Al acceder, aceptas nuestros Términos de servicio y la Política de privacidad.
      </p>
    </div>
  </main>
</div>

<!-- Footer -->
<app-footer></app-footer>
