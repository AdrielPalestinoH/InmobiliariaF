<div class="row">
  @for (inmueble of inmuebles; track inmueble.id) {
    <div class="col-md-4 mb-4">
      <div class="card h-100 border-0 shadow-sm hover-shadow">
        <div class="position-relative">
          <img [src]="obtenerImagenPrincipal(inmueble)" 
               class="card-img-top" 
               alt="inmueble"
               style="height: 200px; object-fit: cover;">
          
          <span class="badge bg-primary position-absolute top-0 end-0 m-2">
            {{ inmueble.idTipoInmueble }} 
          </span>
        </div>

        <div class="card-body">
          <h5 class="card-title text-primary">{{ inmueble.titulo }}</h5>
          <p class="text-muted small">
            <i class="bi bi-geo-alt"></i> {{ inmueble.disponibilidad }}
          </p>
          <h4 class="fw-bold">{{ inmueble.precio | currency:'MXN':'symbol-narrow' }}</h4>
        </div>

        <div class="card-footer bg-transparent border-0 pb-3">
          <button class="btn btn-outline-primary w-100" [routerLink]="['/detalle', inmueble.id]">
            Ver Propiedad
          </button>
        </div>
      </div>
    </div>
  }
</div>
