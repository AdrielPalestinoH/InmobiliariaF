<div class="row">
  @for (inmueble of inmuebles; track inmueble.id) {
    <div class="col-md-4 mb-4">
      <div class="card h-100 border-0 shadow-sm hover-shadow">
<div class="position-relative">
  <img [src]="(inmueble.imagenes && inmueble.imagenes.length > 0 ? inmueble.imagenes[0].urlImagen : 'https://picsum.photos/400/300')" class="card-img-top" alt="inmueble">
  <span class="badge bg-primary position-absolute top-0 end-0 m-2">
    {{ inmueble.idTipoInmueble }} </span>
</div>
>
<div class="card-body">
  <h5 class="card-title text-primary">{{ inmueble.titulo }}</h5>
  <p class="text-muted small"><i class="bi bi-geo-alt"></i> {{ inmueble.disponibilidad }}</p> <p class="card-text text-truncate-2">{{ inmueble.titulo }}</p> <h4 class="fw-bold">{{ inmueble.precio | currency:'MXN':'symbol-narrow' }}</h4>
</div>
        <div class="card-footer bg-transparent border-0 pb-3">
          <button class="btn btn-outline-primary w-100" [routerLink]="['/detalle', inmueble.id]">
            Ver Propiedad
          </button>
        </div>
      </div>
    </div>
  } @empty {
    <div class="col-12 text-center py-5">
      <i class="bi bi-house-exclamation display-1 text-muted"></i>
      <p class="mt-3">No hay inmuebles disponibles en este momento.</p>
    </div>
  }
</div>
