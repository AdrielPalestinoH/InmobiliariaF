<div class="clientes-page p-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3><i class="bi bi-people"></i> Clientes</h3>
    <button class="btn btn-primary" (click)="nuevoClienteForm()">
      <i class="bi" [ngClass]="mostrarFormulario ? 'bi-x-lg' : 'bi-plus-lg'"></i>
      {{ mostrarFormulario ? ' Cerrar formulario' : ' Agregar Cliente' }}
    </button>
  </div>

  <div *ngIf="mostrarFormulario" class="card p-4 mb-4 shadow-sm border-primary">
    <h5 class="mb-3 text-primary">
      {{ modoEdicion ? 'Editar Cliente' : 'Nuevo Cliente' }}
    </h5>

    <form (ngSubmit)="guardarCliente()" #f="ngForm">
      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label fw-semibold">Nombre <span class="text-danger">*</span></label>
          <input
            class="form-control"
            placeholder="Ej. Juan"
            [(ngModel)]="clienteActual.nombre"
            name="nombre"
            #nombre="ngModel"
            [class.is-invalid]="nombre.invalid && nombre.touched"
            required
          />
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label fw-semibold">Apellidos</label>
          <input
            class="form-control"
            placeholder="Ej. Pérez"
            [(ngModel)]="clienteActual.apellidos"
            name="apellidos"
          />
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label fw-semibold">Email <span class="text-danger">*</span></label>
          <input
            type="email"
            class="form-control"
            placeholder="juan@correo.com"
            [(ngModel)]="clienteActual.email"
            name="email"
            #email="ngModel"
            [class.is-invalid]="email.invalid && email.touched"
            required
            email
          />
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label fw-semibold">Teléfono</label>
          <input
            class="form-control"
            placeholder="10 dígitos"
            [(ngModel)]="clienteActual.cel"
            name="cel"
          />
        </div>
      </div>

      <div class="d-flex justify-content-end gap-2 mt-3">
        <button
          class="btn btn-success"
          type="submit"
          [disabled]="f.invalid"
        >
          <i class="bi bi-check-lg"></i>
          {{ modoEdicion ? 'Actualizar' : 'Guardar' }}
        </button>
        <button
          type="button"
          class="btn btn-secondary"
          (click)="mostrarFormulario = false"
        >
          Cancelar
        </button>
      </div>
    </form>
  </div>

  <div class="card p-3 mb-3 shadow-sm bg-light">
    <div class="input-group">
      <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
      <input
        class="form-control border-start-0"
        placeholder="Buscar cliente por nombre, apellido o correo..."
        [(ngModel)]="filtro"
      />
    </div>
  </div>

  <div class="table-responsive card shadow-sm">
    <table class="table table-hover align-middle mb-0">
      <thead class="table-dark text-center">
        <tr>
          <th style="width: 50px;">#</th>
          <th>Nombre Completo</th>
          <th>Email</th>
          <th>Teléfono</th>
          <th>Tipo</th>
          <th style="width: 150px;">Acciones</th>
        </tr>
      </thead>
      <tbody class="text-center">
        <tr *ngFor="let c of buscar(); let i = index">
          <td><span class="badge bg-secondary">{{ i + 1 }}</span></td>
          <td class="text-start ps-4">{{ c.nombre }} {{ c.apellidos }}</td>
          <td>{{ c.email }}</td>
          <td>{{ c.cel || 'N/A' }}</td>
          <td>
            <span class="badge rounded-pill" 
              [ngClass]="c.tipoUsuarioId === 1 ? 'bg-info text-dark' : 'bg-light text-dark border'">
              {{ c.tipoUsuarioDescripcion || 'Cliente' }}
            </span>
          </td>
          <td>
            <button
              class="btn btn-sm btn-outline-primary"
              (click)="editarCliente(c)"
              title="Editar cliente"
            >
              <i class="bi bi-pencil-square"></i>
            </button>
          </td>
        </tr>

        <tr *ngIf="buscar().length === 0">
          <td colspan="6" class="text-muted py-4">
            <i class="bi bi-info-circle"></i> No se encontraron clientes con el filtro: "<strong>{{filtro}}</strong>"
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
