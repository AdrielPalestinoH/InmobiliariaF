<div class="container mt-4">
  <h2>Gestión de Usuarios</h2>

  <form (ngSubmit)="guardar()" #f="ngForm" class="card p-4 mb-4 shadow-sm">
    <div class="row">
      <div class="col-md-6 mb-3">
        <label>Nombre</label>
        <input class="form-control" [(ngModel)]="nuevo.nombre" name="nombre" required>
      </div>
      <div class="col-md-6 mb-3">
        <label>Apellidos</label>
        <input class="form-control" [(ngModel)]="nuevo.apellidos" name="apellidos" required>
      </div>
    </div>

    <div class="row">
      <div class="col-md-6 mb-3">
        <label>Email</label>
        <input type="email" class="form-control" [(ngModel)]="nuevo.email" name="email" required>
      </div>
      <div class="col-md-6 mb-3">
        <label>Celular</label>
        <input class="form-control" [(ngModel)]="nuevo.cel" name="cel" required>
      </div>
    </div>

    <div class="mb-3">
      <label>Tipo de Usuario</label>
      <select class="form-select" [(ngModel)]="tipoId" name="tipoId" required>
        <option [ngValue]="null" disabled>Seleccione un rol...</option>
        <option *ngFor="let t of tipos" [ngValue]="t.id_tipo_usuario">
          {{ t.role }}
        </option>
      </select>
    </div>

    <button class="btn btn-success w-100" type="submit" [disabled]="f.invalid">
      <i class="bi bi-person-plus-fill"></i> Guardar Usuario
    </button>
  </form>

  <h3>Lista de Usuarios</h3> 
  <ul class="list-group shadow-sm">
    <li class="list-group-item d-flex justify-content-between align-items-center" *ngFor="let u of usuarios">
      <div>
        <strong>{{ u.nombre }} {{ u.apellidos }}</strong>
        <br>
        <small class="text-muted">{{ u.email }}</small>
      </div>
      <span class="badge bg-primary rounded-pill">{{ u.tipoUsuarioDescripcion }}</span>
    </li>
  </ul>
</div>
