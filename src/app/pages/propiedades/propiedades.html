<div class="d-flex flex-column min-vh-100">
  <app-navbar></app-navbar>

  <div class="container flex-grow-1 my-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2>Propiedades disponibles</h2>
      
      <section>
        <select class="form-select w-auto" (change)="onOrdenChange($event)">
          <option value="default">Por defecto</option>
          <option value="priceAsc">Precio menor a mayor</option>
          <option value="priceDesc">Precio mayor a menor</option>
        </select>
      </section>
    </div>

    <section>
      <div class="row">
        @for (inmueble of inmueblesView; track inmueble.id) {
          <div class="col-md-4 mb-4">
            <app-propiedad-card [inmueble]="inmueble"></app-propiedad-card>
          </div>
        }
        
        @if (inmueblesView.length === 0) {
          <div class="col-12 text-center py-5">
            <p class="text-muted">No hay propiedades disponibles por el momento.</p>
          </div>
        }
      </div>
    </section>
  </div>
</div>

<app-footer></app-footer>
