<div class="card h-100 shadow-sm border-0">
    <div class="property-card__media position-relative">
        <span class="badge bg-primary position-absolute top-0 start-0 m-2 shadow-sm">
            {{ inmueble.disponibilidad || 'DISPONIBLE' }}
        </span>
        
        <img class="card-img-top property-card__img" 
             [src]="getImagenUrl()" 
             [alt]="inmueble.titulo" 
             style="height: 200px; object-fit: cover;"
             loading="lazy" />
    </div>

    <div class="card-body">
        <h5 class="card-title text-primary text-truncate">{{ inmueble.titulo }}</h5>

        <div class="d-flex justify-content-between text-muted small border-top pt-3 mt-2">
            <span class="d-inline-flex align-items-center gap-1" title="Recámaras">
                <i class="bi bi-door-open"></i>
                <strong>{{ inmueble.recamaras || 0 }}</strong>
            </span>
            
            <span class="d-inline-flex align-items-center gap-1" title="Baños">
                <i class="bi bi-droplet"></i>
                <strong>{{ inmueble.banos || 0 }}</strong>
            </span>
            
            <span class="d-inline-flex align-items-center gap-1" title="Estacionamientos">
                <i class="bi bi-car-front"></i>
                <strong>{{ inmueble.estacionamientos || 0 }}</strong>
            </span>
            
            <span class="d-inline-flex align-items-center gap-1" title="Construcción">
                <i class="bi bi-rulers"></i>
                <strong>{{ inmueble.construccionM2 || 0 }}</strong>
                <span>m²</span>
            </span>
        </div>

        <p class="mb-0 mt-3 h5 fw-bold text-dark">
            {{ inmueble.precio | currency:'MXN':'symbol-narrow' }}
        </p>
    </div>

    <div class="card-footer bg-transparent border-0 pb-3">
       <button class="btn btn-outline-primary w-100" 
                [routerLink]="['/detalle-propiedad', inmueble.id]"> Ver Detalle
        </button>
    </div>
</div>
